<div class="header">
  <h1>Explorador de Países del Mundo</h1>
</div>

<div class="controles">
  <input 
    type="text" 
    placeholder="Buscar país por nombre..." 
    [(ngModel)]="textoBusqueda"
  >
  
  <select [(ngModel)]="continenteSeleccionado">
    <option value="Todos">Todos los continentes</option>
    <option value="Africa">África</option>
    <option value="Asia">Asia</option>
    <option value="Europe">Europa</option>
    <option value="North America">Norteamérica</option>
    <option value="South America">Sudamérica</option>
    <option value="Australia-Oceania">Oceanía</option>
  </select>
</div>

<div class="grid-paises">
  @for (pais of paisesFiltrados; track pais.country) {
<div class="tarjeta-basica" [routerLink]="['/pais', pais.country]" style="cursor: pointer;">
  <img [src]="pais.countryInfo.flag" [alt]="'Bandera de ' + pais.country">
  <h3>{{ pais.country }}</h3>
  <p>Continente: {{ pais.continent }}</p>
</div>
  } @empty {
    <p class="mensaje-vacio">No se encontraron países que coincidan con tu búsqueda.</p>
  }
</div>
